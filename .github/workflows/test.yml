name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.12']
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: dfmm
      - uses: actions/checkout@v4
        with:
          repository: yipihey/HierarchicalGrids.jl
          path: HierarchicalGrids.jl
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - name: Instantiate
        working-directory: dfmm
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Run tests
        working-directory: dfmm
        run: julia --project=. -e 'using Pkg; Pkg.test()'
